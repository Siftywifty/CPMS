<section class="resume">

    <h1>Resume</h1>

    <div class="card">

        <h2>Current Resume</h2>

        <p><strong>File Name:</strong> {{resume.fileName}}</p>

        <p><strong>Uploaded On:</strong> {{resume.uploadedOn}}</p>

        <p>
            <strong>Status:</strong>
            <span class="status">{{resume.status}}</span>
        </p>

        <button>Upload New Resume</button>

        <button class="download">
            Download Resume
        </button>

    </div>

</section>
