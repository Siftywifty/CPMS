<section class="candidates">

  <header class="candidates-head">
    <p class="eyebrow">Talent pool</p>
    <h1>Search candidates</h1>
  </header>

  <div class="filter-bar">
    <input
      type="text"
      placeholder="Search by name or roll number"
      [(ngModel)]="searchTerm"
      (ngModelChange)="applyFilters()"
      class="search-input" />
    <div class="cgpa-filter">
      <label for="minCgpa">Min CGPA</label>
      <input id="minCgpa" type="number" step="0.1" [(ngModel)]="minCgpa" (ngModelChange)="applyFilters()" class="mono" />
    </div>
  </div>

  <p class="empty-state" *ngIf="!isLoading && filtered.length === 0">
    No candidates match your filters.
  </p>

  <div class="candidate-list">
    <article class="candidate-card" *ngFor="let s of filtered">
      <div class="avatar">{{ s.firstName.charAt(0) }}{{ s.lastName.charAt(0) }}</div>
      <div class="candidate-info">
        <p class="candidate-name">{{ s.firstName }} {{ s.lastName }}</p>
        <p class="candidate-meta">{{ s.rollNumber }} &middot; {{ s.departmentName }} &middot; Batch {{ s.batch }}</p>
      </div>
      <div class="candidate-stats">
        <span class="cgpa-badge mono">CGPA {{ s.cgpa }}</span>
        <span class="status-pill" [class.status-placed]="s.placementStatus === 'Placed'" [class.status-not-placed]="s.placementStatus === 'Not Placed'">{{ s.placementStatus }}</span>
      </div>
    </article>
  </div>

</section>
